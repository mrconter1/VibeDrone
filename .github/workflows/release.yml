name: Release

# Tag a version to cut a release, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# Builds the Godot .NET game (exported as a portable zip), publishes the Avalonia launcher, wraps the
# launcher in an Inno Setup installer, and attaches both to a GitHub Release. The tag (minus "v") is
# stamped into project.godot for the in-game version label. The launcher downloads/updates the game
# from the release zip on the user's machine.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GODOT_VERSION: 4.3.0

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Godot (.NET) + export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: true
          include-templates: true

      - name: Stamp version from tag
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          sed -i "s|^config/version=.*|config/version=\"$VER\"|" godot/project.godot
          echo "Stamped version: $VER"

      - name: Import project (build resource cache)
        shell: bash
        run: godot --headless --path godot --import || true

      - name: Export Windows build
        shell: bash
        run: |
          mkdir -p build
          godot --headless --path godot --export-release "Windows Desktop"

      - name: Package portable game zip
        shell: bash
        run: 7z a "OpenDrone-${GITHUB_REF_NAME}-windows.zip" ./build/*

      - name: Publish launcher (self-contained)
        shell: bash
        run: dotnet publish launcher/VibeDroneLauncher.csproj -c Release -o launcher/publish

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build launcher installer
        shell: bash
        run: |
          set -e
          VER="${GITHUB_REF_NAME#v}"
          ISCC="/c/Program Files (x86)/Inno Setup 6/ISCC.exe"
          [ -f "$ISCC" ] || ISCC="iscc"
          ROOT="$(pwd -W 2>/dev/null || pwd)"
          "$ISCC" "/DMyAppVersion=$VER" "/DSrcDir=$ROOT" installer/OpenDrone.iss
          ls -la installer_out

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # Installer (launcher, auto-updates the game) + portable game zip (the launcher's update feed).
          files: |
            installer_out/VibeDrone-Setup-*.exe
            OpenDrone-*-windows.zip
          generate_release_notes: true
